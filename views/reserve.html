<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leo's Cafe — Reserve a Table</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../public/css/reserve.css">

</head>

<body>

  <nav class="top-nav">
    <a class="nav-brand" href="index.html">Leo's Cafe</a>
    <div class="nav-links">
      <a class="nav-pill" href="rewards.html"><i class="ti ti-award"></i> Rewards</a>
      <div class="nav-divider"></div>
      <a class="nav-pill active" href="reserve.html"><i class="ti ti-calendar"></i> Reserve</a>
      <div class="nav-divider"></div>
      <a class="nav-pill" href="order.html"><i class="ti ti-shopping-bag"></i> Order Ahead</a>
      <div class="nav-divider"></div>
      <a class="nav-pill" href="index.html"><i class="ti ti-menu-2"></i> Menu</a>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <div class="page-eyebrow">Table Booking</div>
      <div class="page-title">Reserve your<br>favourite seat.</div>
      <p class="page-sub">Book ahead and your table will be waiting. We hold reservations for up to 15 minutes.</p>
    </div>

    <div class="success-banner" id="successBanner">
      <p>✅ Your table is confirmed! We'll see you soon.</p>
    </div>

    <div class="form-card">
      <div class="form-grid">

        <div class="form-group">
          <label>Date</label>
          <div class="input-wrap">
            <i class="ti ti-calendar input-icon"></i>
            <input type="date" id="resDate">
          </div>
        </div>

        <div class="form-group">
          <label>Number of guests</label>
          <div class="guests-row" id="guestsRow">
            <button class="guest-btn" onclick="selectGuests(this,1)">1</button>
            <button class="guest-btn active" onclick="selectGuests(this,2)">2</button>
            <button class="guest-btn" onclick="selectGuests(this,3)">3</button>
            <button class="guest-btn" onclick="selectGuests(this,4)">4</button>
            <button class="guest-btn" onclick="selectGuests(this,5)">5+</button>
          </div>
        </div>

        <div class="form-group full">
          <label>Available time slots</label>
          <div class="slots-grid" id="slotsGrid">
            <button class="slot-btn" onclick="selectSlot(this)">9:00 AM</button>
            <button class="slot-btn" onclick="selectSlot(this)">9:30 AM</button>
            <button class="slot-btn" onclick="selectSlot(this)">10:00 AM</button>
            <button class="slot-btn" onclick="selectSlot(this)">10:30 AM</button>
            <button class="slot-btn" onclick="selectSlot(this)">11:00 AM</button>
            <button class="slot-btn" onclick="selectSlot(this)">11:30 AM</button>
            <button class="slot-btn" onclick="selectSlot(this)">12:00 PM</button>
            <button class="slot-btn" onclick="selectSlot(this)">12:30 PM</button>
            <button class="slot-btn" onclick="selectSlot(this)">1:00 PM</button>
            <button class="slot-btn" onclick="selectSlot(this)">1:30 PM</button>
            <button class="slot-btn" onclick="selectSlot(this)">2:00 PM</button>
            <button class="slot-btn" onclick="selectSlot(this)">2:30 PM</button>
            <button class="slot-btn" onclick="selectSlot(this)">3:00 PM</button>
            <button class="slot-btn" onclick="selectSlot(this)">3:30 PM</button>
            <button class="slot-btn" onclick="selectSlot(this)">4:00 PM</button>
            <button class="slot-btn" onclick="selectSlot(this)">4:30 PM</button>
            <button class="slot-btn" onclick="selectSlot(this)">5:00 PM</button>
          </div>
        </div>

        <div class="form-group full">
          <label>Special requests <span
              style="font-size:10px;text-transform:none;letter-spacing:0;color:var(--warm-gray);font-weight:300;">(optional)</span></label>
          <div class="input-wrap">
            <textarea id="specialReq" placeholder="Dietary requirements, high chair needed, occasion notes…"></textarea>
          </div>
        </div>

      </div>

      <div style="margin-top:24px;">
        <button class="btn-submit" onclick="submitReservation()">Confirm Reservation</button>
      </div>
    </div>

    <!-- Existing reservations -->
    <div class="reservations-section">
      <div class="res-head">
        <h2>Your Reservations</h2>
        <span>Upcoming</span>
      </div>
      <div class="res-list" id="resList">
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../public/js/reserve.js"></script>

</body>

</html>
